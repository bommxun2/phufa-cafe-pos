[nginx-proxy]
nginx-target ansible_host="{{ nginx_public_ip }}"

[nginx-proxy:vars]
app_server_private_ip="{{ backend_server_private_ip }}"
jenkins_server_private_ip="{{ jenkins_server_private_ip }}"

[backend-server]
backend-target ansible_host="{{ backend_server_private_ip }}"

[all:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=pos-system-key.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no'