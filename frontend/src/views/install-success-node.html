<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Install Success - Phufa Cafe</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap");
      :root {
        --background-color: #dde0da;
        --card-background: #ffffff;
        --primary-color: #115e31;
        --success-color: #115e31;
        --text-dark: #333333;
        --text-light: #555555;
        --border-radius-card: 16px;
      }

      body {
        margin: 0;
        padding: 20px;
        font-family: "Google Sans", sans-serif;
        background-color: var(--background-color);
        color: var(--text-dark);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
      }

      .status-container {
        background-color: var(--card-background);
        padding: 40px 50px;
        border-radius: var(--border-radius-card);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        text-align: center;
        max-width: 550px;
        width: 100%;
      }

      .status-container .icon {
        font-size: 3.5rem;
        color: var(--success-color);
        margin-bottom: 15px;
        line-height: 1;
      }

      .status-container h2 {
        font-size: 1.8rem;
        color: var(--text-dark);
        margin-top: 0;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .status-container p {
        font-size: 1rem;
        color: var(--text-light);
        margin-bottom: 0;
        line-height: 1.6;
        font-weight: 400;
      }

      @media (max-width: 600px) {
        .status-container {
          padding: 30px 25px;
        }
        .status-container .icon {
          font-size: 3rem;
          margin-bottom: 10px;
        }
        .status-container h2 {
          font-size: 1.6rem;
        }
        .status-container p {
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="status-container">
      <div class="icon">✅</div>
      <h2>ระบบหน้าบ้าน (Frontend) พร้อมใช้งาน!</h2>
      <p>
        ส่วนติดต่อผู้ใช้ (UI) ของ Phufa Cafe โหลดสำเร็จและพร้อมแสดงผลแล้ว<br />
        สามารถเข้าใช้งานหน้าเว็บได้ตามปกติ
      </p>
    </div>
  </body>
</html>
