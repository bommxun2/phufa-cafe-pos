global:
  scrape_interval: 15s # Get data every 15 second

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100'] # Name srvice in docker compose

  - job_name: 'node-api'
    static_configs:
      - targets: ['node-api:5000'] # Get metrics from node app